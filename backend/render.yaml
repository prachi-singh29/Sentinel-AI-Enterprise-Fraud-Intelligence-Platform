databases:
  - name: fraud-detection-db
    plan: free
    databaseName: frauddb
    user: frauddb_user

services:
  - type: web
    name: fraud-detection-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fraud-detection-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENV
        value: production
      - key: CORS_ORIGINS
        value: https://your-app.vercel.app,http://localhost:5173
      - key: ADMIN_EMAIL
        value: admin@frauddetect.io
      - key: ADMIN_PASSWORD
        sync: false
    healthCheckPath: /api/health
